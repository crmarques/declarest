site_name: DeclaREST
site_description: Declarative resource sync between Git and REST APIs
repo_url: https://github.com/crmarques/declarest
repo_name: crmarques/declarest

plugins:
  - search
  - macros:
      module_name: docs/macros

theme:
  name: material
  logo: assets/logo-simple.png
  favicon: assets/favicon.png
  palette:
    - scheme: default
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/weather-night
        name: Switch to light mode

nav:
  - Home: index.md
  - Getting Started:
      - Quickstart (CLI): getting-started/quickstart-cli.md
      - Quickstart (Operator): getting-started/quickstart-operator.md
  - Guide:
      - Core Concepts: guide/core-concepts.md
      - Working with Resources: guide/working-with-resources.md
      - Managing Secrets: guide/managing-secrets.md
      - Metadata and API Modeling: guide/metadata-and-api-modeling.md
      - Repository and Git Workflows: guide/repository-and-git-workflows.md
      - Running the Operator: guide/running-the-operator.md
      - Installing with OLM: guide/installing-with-olm.md
  - Reference:
      - CLI: reference/cli.md
      - Configuration: reference/configuration.md
      - Metadata Schema: reference/metadata-schema.md
      - Operator CRDs: reference/operator-crds.md
  - Topics:
      - Troubleshooting: topics/troubleshooting.md
      - Production Hardening: topics/production-hardening.md
      - Architecture: topics/architecture.md
  - Contributing: contributing/contributing.md
