site_name: DeclaREST
site_description: Declarative resource sync between Git and REST APIs
repo_url: https://github.com/crmarques/declarest
repo_name: crmarques/declarest

plugins:
  - search
  - macros:
      module_name: docs/macros

theme:
  name: material
  logo: assets/logo-simple.png
  favicon: assets/favicon.png
  palette:
    - scheme: default
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/weather-night
        name: Switch to light mode

nav:
  - Home: index.md
  - Getting Started:
      - Quickstart (CLI): getting-started/quickstart.md
      - Quickstart (Operator): getting-started/quickstart-operator.md
      - Troubleshooting: getting-started/troubleshooting.md
  - Concepts:
      - Overview: concepts/overview.md
      - Contexts: concepts/context.md
      - Resource Files: concepts/resource.md
      - Paths and Selectors: concepts/paths-and-selectors.md
      - Repository: concepts/repository.md
      - Managed Server: concepts/managed-server.md
      - Metadata Overview: concepts/metadata.md
      - Metadata Overrides: concepts/metadata-overrides.md
      - Secrets: concepts/secrets.md
      - Git repository as source of truth: concepts/git-source-of-truth.md
      - CLI role in GitOps: concepts/cli-in-gitops.md
      - Operator model: concepts/operator.md
  - How-to:
      - Sync Resources (CLI/CI): workflows/sync.md
      - Repository Operations: workflows/repository.md
      - Editing Metadata and Contexts: workflows/editing.md
      - Secrets and Safe Save: workflows/secrets-and-safe-save.md
      - Inspect and Debug Mappings: workflows/ad-hoc.md
      - Custom API Modeling Recipes: workflows/custom-api-modeling.md
      - Custom Paths: concepts/metadata-custom-paths.md
      - Advanced Metadata Configuration: workflows/advanced-metadata-configuration.md
      - Run the Operator: workflows/operator.md
  - Reference:
      - Configuration: reference/configuration.md
      - CLI: reference/cli.md
      - Operator CRDs: reference/operator-crds.md
      - Syntax (paths/selectors/placeholders): reference/syntax.md
      - Metadata schema reference: reference/metadata-schema.md
  - Advanced:
      - Architecture deep dive: advanced/architecture.md
      - Operator deep dive: advanced/operator-deep-dive.md
      - Security hardening: advanced/security.md
      - Performance and scale: advanced/performance.md
  - Contributing: 
      - How to contribute: contributing/contributing.md
      - E2E testing: contributing/e2e-components.md
