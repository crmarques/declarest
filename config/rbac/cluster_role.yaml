apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: declarest-operator
  labels:
    declarest.io/aggregate-to-operator: "true"
aggregationRule:
  clusterRoleSelectors:
    - matchLabels:
        declarest.io/aggregate-to-operator: "true"
rules:
  - apiGroups: ["declarest.io"]
    resources:
      - "resourcerepositories"
      - "managedservices"
      - "secretstores"
      - "syncpolicies"
      - "repositorywebhooks"
      - "metadatabundles"
      - "crdgenerators"
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["declarest.io"]
    resources:
      - "resourcerepositories/status"
      - "managedservices/status"
      - "secretstores/status"
      - "syncpolicies/status"
      - "repositorywebhooks/status"
      - "metadatabundles/status"
      - "crdgenerators/status"
    verbs: ["get", "update", "patch"]
  - apiGroups: ["declarest.io"]
    resources:
      - "resourcerepositories/finalizers"
      - "managedservices/finalizers"
      - "secretstores/finalizers"
      - "syncpolicies/finalizers"
      - "repositorywebhooks/finalizers"
      - "metadatabundles/finalizers"
      - "crdgenerators/finalizers"
    verbs: ["update"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["clusterroles"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
