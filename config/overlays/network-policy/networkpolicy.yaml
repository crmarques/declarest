apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: declarest-operator
  namespace: declarest-system
  labels:
    app.kubernetes.io/name: declarest-operator
    app.kubernetes.io/component: operator
    app.kubernetes.io/part-of: declarest
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: declarest-operator
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow metrics scraping from any namespace with the monitoring label.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 8080
    # Allow health probes from the kubelet.
    - ports:
        - protocol: TCP
          port: 8081
    # Allow repository webhook events.
    - ports:
        - protocol: TCP
          port: 8082
  egress:
    # Allow DNS for Git, OCI registry, and managed-service endpoints.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow TLS egress to configured Git remotes, metadata bundle registries,
    # Vault, and managed services. Narrow this ipBlock in production.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
