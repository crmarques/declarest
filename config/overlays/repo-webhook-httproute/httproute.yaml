apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: declarest-operator-repository-webhook
  namespace: declarest-system
  labels:
    app.kubernetes.io/name: declarest-operator
spec:
  parentRefs:
    - name: my-gateway  # Replace with your Gateway name
      namespace: default
  hostnames:
    - declarest-webhooks.example.com  # Replace with your domain
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /webhooks/repository
      backendRefs:
        - name: declarest-operator-repository-webhook
          port: 8082
