apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: declarest-operator-validating-webhook-configuration
  annotations:
    cert-manager.io/inject-ca-from: declarest-system/declarest-operator-webhook-server-cert
webhooks:
  - name: vresourcerepository-v1alpha1.declarest.io
    admissionReviewVersions:
      - v1
    sideEffects: None
    failurePolicy: Fail
    timeoutSeconds: 10
    clientConfig:
      service:
        name: declarest-operator-webhook-service
        namespace: declarest-system
        path: /validate-declarest-io-v1alpha1-resourcerepository
    rules:
      - apiGroups: ["declarest.io"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE", "DELETE"]
        resources: ["resourcerepositories"]
  - name: vmanagedservice-v1alpha1.declarest.io
    admissionReviewVersions:
      - v1
    sideEffects: None
    failurePolicy: Fail
    timeoutSeconds: 10
    clientConfig:
      service:
        name: declarest-operator-webhook-service
        namespace: declarest-system
        path: /validate-declarest-io-v1alpha1-managedservice
    rules:
      - apiGroups: ["declarest.io"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE", "DELETE"]
        resources: ["managedservices"]
  - name: vsecretstore-v1alpha1.declarest.io
    admissionReviewVersions:
      - v1
    sideEffects: None
    failurePolicy: Fail
    timeoutSeconds: 10
    clientConfig:
      service:
        name: declarest-operator-webhook-service
        namespace: declarest-system
        path: /validate-declarest-io-v1alpha1-secretstore
    rules:
      - apiGroups: ["declarest.io"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE", "DELETE"]
        resources: ["secretstores"]
  - name: vsyncpolicy-v1alpha1.declarest.io
    admissionReviewVersions:
      - v1
    sideEffects: None
    failurePolicy: Fail
    timeoutSeconds: 10
    clientConfig:
      service:
        name: declarest-operator-webhook-service
        namespace: declarest-system
        path: /validate-declarest-io-v1alpha1-syncpolicy
    rules:
      - apiGroups: ["declarest.io"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["syncpolicies"]
  - name: vrepositorywebhook-v1alpha1.declarest.io
    admissionReviewVersions:
      - v1
    sideEffects: None
    failurePolicy: Fail
    timeoutSeconds: 10
    clientConfig:
      service:
        name: declarest-operator-webhook-service
        namespace: declarest-system
        path: /validate-declarest-io-v1alpha1-repositorywebhook
    rules:
      - apiGroups: ["declarest.io"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE", "DELETE"]
        resources: ["repositorywebhooks"]
  - name: vmetadatabundle-v1alpha1.declarest.io
    admissionReviewVersions:
      - v1
    sideEffects: None
    failurePolicy: Fail
    timeoutSeconds: 10
    clientConfig:
      service:
        name: declarest-operator-webhook-service
        namespace: declarest-system
        path: /validate-declarest-io-v1alpha1-metadatabundle
    rules:
      - apiGroups: ["declarest.io"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE", "DELETE"]
        resources: ["metadatabundles"]
  - name: vcrdgenerator-v1alpha1.declarest.io
    admissionReviewVersions:
      - v1
    sideEffects: None
    failurePolicy: Fail
    timeoutSeconds: 10
    clientConfig:
      service:
        name: declarest-operator-webhook-service
        namespace: declarest-system
        path: /validate-declarest-io-v1alpha1-crdgenerator
    rules:
      - apiGroups: ["declarest.io"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE", "DELETE"]
