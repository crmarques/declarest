apiVersion: declarest.io/v1alpha1
kind: ResourceRepository
metadata:
  name: example-repository
spec:
  # Context parity:
  # - repository.resource-format -> spec.resourceFormat
  # - repository.git.remote.*   -> spec.git.*
  type: git
  pollInterval: 1m
  resourceFormat: json
  git:
    url: https://github.com/example/declarest-resources.git
    branch: main
    auth:
      tokenSecretRef:
        name: repository-credentials
        key: token
    webhook:
      provider: gitea
      secretRef:
        name: repository-credentials
        key: webhook-secret
  storage:
    existingPVC:
      name: repository-pvc
