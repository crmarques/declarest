apiVersion: declarest.io/v1alpha1
kind: ResourceRepository
metadata:
  name: example-repository
spec:
  # Context parity:
  # - repository.git.remote.*   -> spec.git.*
  type: git
  pollInterval: 1m
  git:
    url: https://github.com/example/declarest-resources.git
    branch: main
    auth:
      tokenRef:
        name: repository-credentials
        key: token
  storage:
    # Deprecated in v1alpha1; repository state uses the operator manager state volume.
    existingPVC:
      name: ignored-v1alpha1
