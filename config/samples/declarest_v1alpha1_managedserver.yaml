apiVersion: declarest.io/v1alpha1
kind: ManagedServer
metadata:
  name: example-managed-server
spec:
  # Context parity:
  # - managed-server.http.*     -> spec.http.*
  # - metadata.bundle           -> spec.metadata.bundle
  http:
    baseURL: https://managed-server.example.com/api
    requestThrottling:
      maxConcurrentRequests: 4
      queueSize: 16
      requestsPerSecond: 20
      burst: 40
    auth:
      oauth2:
        tokenURL: https://managed-server.example.com/oauth/token
        grantType: client_credentials
        clientIDRef:
          name: managed-server-oauth2
          key: client-id
        clientSecretRef:
          name: managed-server-oauth2
          key: client-secret
  openapi:
    url: https://managed-server.example.com/openapi.yaml
  metadata:
    bundle: managed-server-bundle:0.0.1
