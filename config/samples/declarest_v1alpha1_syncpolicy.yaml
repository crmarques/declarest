apiVersion: declarest.io/v1alpha1
kind: SyncPolicy
metadata:
  name: example-sync-policy
spec:
  resourceRepositoryRef:
    name: example-repository
  managedServiceRef:
    name: example-managed-service
  secretStoreRef:
    name: example-secret-store
  source:
    path: /customers
    recursive: true
  sync:
    force: false
    prune: false
  # Optional full resync schedule (cron, 5 fields, UTC).
  # fullResyncCron: "0 * * * *"
  suspend: false
