name: Release CLI

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Ensure semver tag
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import os
          import re
          import sys

          ref_name = os.getenv("GITHUB_REF_NAME")
          if not ref_name:
              print("missing github ref name", file=sys.stderr)
              sys.exit(1)

          if not re.fullmatch(r"v[0-9]+\.[0-9]+\.[0-9]+", ref_name):
              print(f"release tag {ref_name!r} must be a semver vX.Y.Z", file=sys.stderr)
              sys.exit(1)
          print(f"releasing module version {ref_name}")
          PY
      - name: Stage release manifest assets
        run: |
          set -euo pipefail
          make release-assets RELEASE_TAG=${{ github.ref_name }}
          mkdir -p .release-assets
          cp dist/install.yaml .release-assets/install.yaml
          cp dist/install-admission-certmanager.yaml .release-assets/install-admission-certmanager.yaml
          cp dist/install-admission-openshift.yaml .release-assets/install-admission-openshift.yaml
          cp dist/install-olm.yaml .release-assets/install-olm.yaml
      - name: Stage OLM bundle assets
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          make bundle-validate
          make catalog-validate
          tar -czf .release-assets/declarest-operator-bundle.tar.gz bundle bundle.Dockerfile
          cp bundle/manifests/declarest-operator.clusterserviceversion.yaml .release-assets/declarest-operator-bundle.yaml
          cp catalog/declarest-operator/catalog.yaml .release-assets/declarest-operator-catalog.yaml
          echo "Staged OLM bundle for version ${version}"
      - name: Validate GoReleaser config
        uses: goreleaser/goreleaser-action@v7.1.0
        with:
          version: v2.15.3
          args: check
      - name: Test
        run: go test -race ./...
      - name: Run GoReleaser (tag release)
        if: ${{ github.event_name != 'workflow_dispatch' }}
        uses: goreleaser/goreleaser-action@v7.1.0
        with:
          version: v2.15.3
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Run GoReleaser (snapshot smoke test)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: goreleaser/goreleaser-action@v7.1.0
        with:
          version: v2.15.3
          args: release --snapshot --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
