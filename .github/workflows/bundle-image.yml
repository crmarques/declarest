name: Publish OLM bundle and catalog

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: bundle-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Resolve version
        id: version
        env:
          GITHUB_REF: ${{ github.ref }}
          GITHUB_SHA: ${{ github.sha }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [[ "$GITHUB_REF" =~ ^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            raw="${GITHUB_REF#refs/tags/v}"
            echo "version=$raw" >> "$GITHUB_OUTPUT"
            echo "push=true" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0-manual-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
            echo "push=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        if: steps.version.outputs.push == 'true'
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare bundle image metadata
        id: bundle-meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: ghcr.io/crmarques/declarest-operator-bundle
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha,prefix=manual-,enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Prepare catalog image metadata
        id: catalog-meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: ghcr.io/crmarques/declarest-operator-catalog
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha,prefix=manual-,enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Validate OLM bundle
        run: |
          make operator-sdk
          ./bin/operator-sdk bundle validate ./bundle --select-optional suite=operatorframework

      - name: Validate OLM catalog
        run: |
          make opm
          ./bin/opm validate catalog

      - name: Build and publish bundle image
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          file: bundle.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ steps.version.outputs.push }}
          tags: ${{ steps.bundle-meta.outputs.tags }}
          labels: ${{ steps.bundle-meta.outputs.labels }}

      - name: Build and publish catalog image
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          file: catalog.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ steps.version.outputs.push }}
          tags: ${{ steps.catalog-meta.outputs.tags }}
          labels: ${{ steps.catalog-meta.outputs.labels }}
