name: Build OLM bundle and catalog images

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: bundle-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Resolve manual version
        id: version
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          echo "value=0.0.0-manual-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Regenerate and validate OLM artifacts
        run: make release-bundle VERSION=${{ steps.version.outputs.value }}

      - name: Prepare bundle image metadata
        id: bundle-meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ghcr.io/crmarques/declarest-operator-bundle
          tags: |
            type=sha,prefix=manual-

      - name: Prepare catalog image metadata
        id: catalog-meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ghcr.io/crmarques/declarest-operator-catalog
          tags: |
            type=sha,prefix=manual-

      - name: Build bundle image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: bundle.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: false
          tags: ${{ steps.bundle-meta.outputs.tags }}
          labels: ${{ steps.bundle-meta.outputs.labels }}

      - name: Build catalog image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: catalog.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: false
          tags: ${{ steps.catalog-meta.outputs.tags }}
          labels: ${{ steps.catalog-meta.outputs.labels }}
