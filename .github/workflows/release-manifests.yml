name: Release install manifests

on:
  workflow_run:
    workflows: ["Publish operator image"]
    types: [completed]

permissions:
  contents: write

jobs:
  release-manifests:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_branch }}

      - name: Resolve release tag
        id: tag
        run: echo "value=${{ github.event.workflow_run.head_branch }}" >> "$GITHUB_OUTPUT"

      - name: Generate install bundles
        run: make release-assets RELEASE_TAG=${{ steps.tag.outputs.value }}

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.tag.outputs.value }}"
          for f in dist/install.yaml dist/install-admission-certmanager.yaml dist/install-admission-openshift.yaml; do
            if [ -f "$f" ]; then
              gh release upload "$tag" "$f" --clobber
            fi
          done
