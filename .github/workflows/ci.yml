name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Dependency review
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Check formatting
        run: |
          unformatted=$(gofmt -l $(go list -f '{{.Dir}}' ./...))
          if [ -n "$unformatted" ]; then
            echo "gofmt needed:"
            echo "$unformatted"
            exit 1
          fi
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test -race ./...
      - name: Vulnerability scan
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.2.0 ./...
      - name: Verify generated manifests
        run: make verify-generated

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.11.4
          args: ./...

  e2e-contract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Validate e2e harness contracts
        run: make e2e-contract
      - name: Validate e2e components
        run: make e2e-validate-components

  workflow-policy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Validate workflow policy
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          import sys

          failures = []

          for path in sorted(Path(".github/workflows").glob("*.yml")):
              text = path.read_text()
              for lineno, line in enumerate(text.splitlines(), 1):
                  match = re.search(r"^\s*uses:\s*([^\s#]+)", line)
                  if not match:
                      continue
                  ref = match.group(1).rsplit("@", 1)[-1]
                  if not re.fullmatch(r"[0-9a-f]{40}", ref):
                      failures.append(f"{path}:{lineno}: action is not pinned to a full SHA")

          for name in ("operator-image.yml", "bundle-image.yml"):
              text = Path(".github/workflows", name).read_text()
              if re.search(r"^\s+push:\s*$", text, re.MULTILINE):
                  failures.append(f".github/workflows/{name}: manual smoke workflow must not publish on push")

          release = Path(".github/workflows/release.yml").read_text()
          for marker in ("sbom:", "provenance:", "actions/attest@"):
              if marker not in release:
                  failures.append(f".github/workflows/release.yml: missing {marker}")

          if failures:
              print("\n".join(failures), file=sys.stderr)
              raise SystemExit(1)
          PY

  olm-bundle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Detect OLM packaging changes
        id: changes
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [[ -z "$BASE_SHA" || "$BASE_SHA" =~ ^0+$ ]]; then
            changed="$(git ls-tree -r --name-only "$HEAD_SHA")"
          else
            changed="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")"
          fi

          if printf '%s\n' "$changed" | grep -Eq '^(\.github/workflows/(ci|release|operator-image|bundle-image)\.yml|Makefile|Dockerfile\.operator|bundle\.Dockerfile|catalog\.Dockerfile|api/v1alpha1/|cmd/declarest-operator-manager/|internal/operator/|config/(crd|default|manager|manifests|olm|overlays|rbac|release|samples|webhook)/|bundle/|catalog/)'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Set up Go
        if: ${{ steps.changes.outputs.run == 'true' }}
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Verify OLM bundle and catalog
        if: ${{ steps.changes.outputs.run == 'true' }}
        run: make verify-bundle
      - name: Skip OLM bundle verification
        if: ${{ steps.changes.outputs.run != 'true' }}
        run: echo "No OLM packaging changes detected."

  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14.4"
      - name: Install docs dependencies
        run: pip install --disable-pip-version-check -r docs/requirements.txt
      - name: Build docs
        run: mkdocs build --strict --clean

  release-config:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Validate GoReleaser config
        uses: goreleaser/goreleaser-action@e24998b8b67b290c2fa8b7c14fcfa7de2c5c9b8c # v7.1.0
        with:
          version: v2.15.3
          args: check
