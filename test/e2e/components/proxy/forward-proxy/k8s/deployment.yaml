apiVersion: apps/v1
kind: Deployment
metadata:
  name: proxy-forward-proxy
  labels:
    app.kubernetes.io/name: proxy-forward-proxy
    declarest.e2e/component-key: proxy-forward-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: proxy-forward-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: proxy-forward-proxy
        declarest.e2e/component-key: proxy-forward-proxy
    spec:
      containers:
        - name: forward-proxy
          image: docker.io/python:3.12-alpine
          command:
            - python
            - ${E2E_KIND_NODE_ROOT}/test/e2e/components/proxy/forward-proxy/app/proxy.py
          env:
            - name: FORWARD_PROXY_BIND_HOST
              value: 0.0.0.0
            - name: FORWARD_PROXY_BIND_PORT
              value: "3128"
            - name: FORWARD_PROXY_ACCESS_LOG
              value: /var/run/declarest-proxy/access.log
            - name: FORWARD_PROXY_AUTH_MODE
              value: "${PROXY_SERVER_AUTH_MODE}"
            - name: FORWARD_PROXY_AUTH_USERNAME
              value: "${PROXY_AUTH_USERNAME}"
            - name: FORWARD_PROXY_AUTH_PASSWORD
              value: "${PROXY_AUTH_PASSWORD}"
          ports:
            - name: http
              containerPort: 3128
          readinessProbe:
            httpGet:
              path: /__health
              port: 3128
            initialDelaySeconds: 2
            periodSeconds: 2
            timeoutSeconds: 2
            failureThreshold: 20
          volumeMounts:
            - name: repo-root
              mountPath: "${E2E_KIND_NODE_ROOT}"
              readOnly: true
            - name: proxy-runtime
              mountPath: /var/run/declarest-proxy
      volumes:
        - name: repo-root
          hostPath:
            path: "${E2E_KIND_NODE_ROOT}"
            type: Directory
        - name: proxy-runtime
          hostPath:
            path: "${PROXY_RUNTIME_NODE_DIR}"
            type: DirectoryOrCreate
