resourceInfo:
  idFromAttribute: /name
  aliasFromAttribute: /name
  collectionPath: /projects/{{.project}}/secrets
operationsInfo:
  createResource:
    httpMethod: POST
    path: /storage/keys/projects/{{.project}}/{{.id}}
    httpHeaders:
    - name: Accept
      value: application/json
    - name: Content-Type
      value: '{{if index . "contentType"}}{{index . "contentType"}}{{else if eq .type "public"}}application/pgp-keys{{else if eq .type "private"}}application/octet-stream{{else}}application/x-rundeck-data-password{{end}}'
    payloadMutation:
    - jqExpression: if type == "object" and has("content") then .content else . end
  getResource:
    path: /storage/keys/projects/{{.project}}/{{.id}}
    httpHeaders:
    - name: Accept
      value: application/json
    payloadMutation:
    - jqExpression: 'if type == "object" and has("meta") then {name: (.name // "{{.id}}"), type: (.meta["Rundeck-key-type"] // "password"), contentType: (.meta["Rundeck-content-type"] // "application/x-rundeck-data-password")} else {name: (.name // "{{.id}}"), type: (.type // (if (.contentType // "") == "application/pgp-keys" then "public" elif (.contentType // "") == "application/octet-stream" then "private" else "password" end)), contentType: (.contentType // (if (.type // "") == "public" then "application/pgp-keys" elif (.type // "") == "private" then "application/octet-stream" else "application/x-rundeck-data-password" end))} end'
  updateResource:
    httpMethod: PUT
    path: /storage/keys/projects/{{.project}}/{{.id}}
    httpHeaders:
    - name: Accept
      value: application/json
    - name: Content-Type
      value: '{{if index . "contentType"}}{{index . "contentType"}}{{else if eq .type "public"}}application/pgp-keys{{else if eq .type "private"}}application/octet-stream{{else}}application/x-rundeck-data-password{{end}}'
    payloadMutation:
    - jqExpression: if type == "object" and has("content") then .content else . end
  deleteResource:
    path: /storage/keys/projects/{{.project}}/{{.id}}
  listCollection:
    path: /storage/keys/projects/{{.project}}
    httpHeaders:
    - name: Accept
      value: application/json
    payloadMutation:
    - jqExpression: '(.resources // []) | map(select(.type == "file") | {name: .name, type: (.meta["Rundeck-key-type"] // "password"), contentType: (.meta["Rundeck-content-type"] // "application/x-rundeck-data-password")})'
  compareResources:
    path: /storage/keys/projects/{{.project}}/{{.id}}
    httpHeaders:
    - name: Accept
      value: application/json
    payloadMutation:
    - jqExpression: 'if type == "object" and has("meta") then {name: (.name // "{{.id}}"), type: (.meta["Rundeck-key-type"] // "password"), contentType: (.meta["Rundeck-content-type"] // "application/x-rundeck-data-password")} else {name: (.name // "{{.id}}"), type: (.type // (if (.contentType // "") == "application/pgp-keys" then "public" elif (.contentType // "") == "application/octet-stream" then "private" else "password" end)), contentType: (.contentType // (if (.type // "") == "public" then "application/pgp-keys" elif (.type // "") == "private" then "application/octet-stream" else "application/x-rundeck-data-password" end))} end'
