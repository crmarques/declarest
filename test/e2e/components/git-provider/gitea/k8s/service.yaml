apiVersion: v1
kind: Service
metadata:
  name: git-provider-gitea
  labels:
    app.kubernetes.io/name: git-provider-gitea
    declarest.e2e/component-key: git-provider-gitea
  annotations:
    declarest.e2e/port-forward: "${GITEA_HTTP_PORT}:3000"
spec:
  selector:
    app.kubernetes.io/name: git-provider-gitea
  ports:
    - name: http
      port: 3000
      targetPort: 3000
