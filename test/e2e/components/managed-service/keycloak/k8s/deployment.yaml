apiVersion: apps/v1
kind: Deployment
metadata:
  name: managed-service-keycloak
  labels:
    app.kubernetes.io/name: managed-service-keycloak
    declarest.e2e/component-key: managed-service-keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: managed-service-keycloak
  template:
    metadata:
      labels:
        app.kubernetes.io/name: managed-service-keycloak
        declarest.e2e/component-key: managed-service-keycloak
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:26.6.1
          args:
            - start-dev
            - --http-port=8080
          env:
            - name: KEYCLOAK_ADMIN
              value: "${KEYCLOAK_ADMIN_USER}"
            - name: KEYCLOAK_ADMIN_PASSWORD
              value: "${KEYCLOAK_ADMIN_PASSWORD}"
          ports:
            - name: http
              containerPort: 8080
