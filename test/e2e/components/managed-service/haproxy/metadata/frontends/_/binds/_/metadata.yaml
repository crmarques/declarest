resource:
  id: "{{/name}}"
  alias: "{{/name}}"
  remoteCollectionPath: /services/haproxy/configuration/frontends/{{/frontend}}/binds
  requiredAttributes:
    - /name
operations:
  list:
    path: .
  get:
    path: ./{{/id}}
  create:
    method: POST
    path: .
    validate:
      requiredAttributes:
        - /name
      schemaRef: openapi:request-body
  update:
    method: PUT
    path: ./{{/id}}
    validate:
      requiredAttributes:
        - /name
      schemaRef: openapi:request-body
  delete:
    path: ./{{/id}}
  compare:
    path: ./{{/id}}
