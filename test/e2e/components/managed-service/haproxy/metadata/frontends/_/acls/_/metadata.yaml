resource:
  id: "{{/index}}"
  alias: "{{/index}}"
  remoteCollectionPath: /services/haproxy/configuration/frontends/{{/frontend}}/acls
  requiredAttributes:
    - /index
    - /acl_name
    - /criterion
operations:
  list:
    path: .
    transforms:
      - jqExpression: 'to_entries | map(.value + {index: (.key | tostring)})'
  get:
    path: ./{{/id}}
    transforms:
      - jqExpression: '. + {index: "{{/id}}"}'
  create:
    method: POST
    path: ./{{/index}}
    transforms:
      - excludeAttributes:
          - /index
    validate:
      requiredAttributes:
        - /acl_name
        - /criterion
      schemaRef: openapi:request-body
  update:
    method: PUT
    path: ./{{/id}}
    transforms:
      - excludeAttributes:
          - /index
    validate:
      requiredAttributes:
        - /acl_name
        - /criterion
      schemaRef: openapi:request-body
  delete:
    path: ./{{/id}}
  compare:
    path: ./{{/id}}
    transforms:
      - jqExpression: '. + {index: "{{/id}}"}'
