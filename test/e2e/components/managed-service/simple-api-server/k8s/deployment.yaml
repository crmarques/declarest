apiVersion: apps/v1
kind: Deployment
metadata:
  name: managed-service-simple-api-server
  labels:
    app.kubernetes.io/name: managed-service-simple-api-server
    declarest.e2e/component-key: managed-service-simple-api-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: managed-service-simple-api-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: managed-service-simple-api-server
        declarest.e2e/component-key: managed-service-simple-api-server
    spec:
      containers:
        - name: simple-api-server
          image: docker.io/python:3.12-alpine
          command:
            - python
            - ${E2E_KIND_NODE_ROOT}/test/e2e/components/managed-service/simple-api-server/app/server.py
          env:
            - name: SIMPLE_API_SERVER_BIND_HOST
              value: 0.0.0.0
            - name: SIMPLE_API_SERVER_BIND_PORT
              value: "8080"
            - name: SIMPLE_API_SERVER_CLIENT_ID
              value: "${SIMPLE_API_SERVER_CLIENT_ID}"
            - name: SIMPLE_API_SERVER_CLIENT_SECRET
              value: "${SIMPLE_API_SERVER_CLIENT_SECRET}"
            - name: SIMPLE_API_SERVER_BASIC_AUTH_USERNAME
              value: "${SIMPLE_API_SERVER_BASIC_AUTH_USERNAME}"
            - name: SIMPLE_API_SERVER_BASIC_AUTH_PASSWORD
              value: "${SIMPLE_API_SERVER_BASIC_AUTH_PASSWORD}"
            - name: SIMPLE_API_SERVER_ENABLE_BASIC_AUTH
              value: "${SIMPLE_API_SERVER_ENABLE_BASIC_AUTH}"
            - name: SIMPLE_API_SERVER_ENABLE_OAUTH2
              value: "${SIMPLE_API_SERVER_ENABLE_OAUTH2}"
            - name: SIMPLE_API_SERVER_ENABLE_MTLS
              value: "${SIMPLE_API_SERVER_ENABLE_MTLS}"
            - name: ENABLE_BASIC_AUTH
              value: "${SIMPLE_API_SERVER_ENABLE_BASIC_AUTH}"
            - name: ENABLE_OAUTH2
              value: "${SIMPLE_API_SERVER_ENABLE_OAUTH2}"
            - name: ENABLE_MTLS
              value: "${SIMPLE_API_SERVER_ENABLE_MTLS}"
            - name: SIMPLE_API_SERVER_CERTS_DIR
              value: "${SIMPLE_API_SERVER_CERTS_DIR}"
            - name: SIMPLE_API_SERVER_TLS_CERT_FILE
              value: "${SIMPLE_API_SERVER_TLS_CERT_FILE}"
            - name: SIMPLE_API_SERVER_TLS_KEY_FILE
              value: "${SIMPLE_API_SERVER_TLS_KEY_FILE}"
            - name: SIMPLE_API_SERVER_MTLS_CLIENT_CERT_DIR
              value: "${SIMPLE_API_SERVER_MTLS_CLIENT_CERT_DIR}"
            - name: SIMPLE_API_SERVER_MTLS_CLIENT_CERT_FILES
              value: "${SIMPLE_API_SERVER_MTLS_CLIENT_CERT_FILES}"
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: repo-root
              mountPath: "${E2E_KIND_NODE_ROOT}"
              readOnly: true
            - name: simple-api-certs
              mountPath: "${SIMPLE_API_SERVER_CERTS_DIR}"
              readOnly: true
      volumes:
        - name: repo-root
          hostPath:
            path: "${E2E_KIND_NODE_ROOT}"
            type: Directory
        - name: simple-api-certs
          hostPath:
            path: "${SIMPLE_API_SERVER_CERTS_NODE_DIR}"
            type: DirectoryOrCreate
