  name: resource-server-simple-api-server
  labels:
    app.kubernetes.io/name: resource-server-simple-api-server
    declarest.e2e/component-key: resource-server-simple-api-server
  annotations:
    declarest.e2e/port-forward: "${SIMPLE_API_SERVER_HOST_PORT}:8080"
