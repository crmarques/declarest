apiVersion: apps/v1
kind: Deployment
metadata:
  name: secret-provider-vault
  labels:
    app.kubernetes.io/name: secret-provider-vault
    declarest.e2e/component-key: secret-provider-vault
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: secret-provider-vault
  template:
    metadata:
      labels:
        app.kubernetes.io/name: secret-provider-vault
        declarest.e2e/component-key: secret-provider-vault
    spec:
      containers:
        - name: vault
          image: docker.io/hashicorp/vault:1.21
          securityContext:
            capabilities:
              add:
                - IPC_LOCK
          env:
            - name: VAULT_DEV_ROOT_TOKEN_ID
              value: "${VAULT_TOKEN}"
            - name: VAULT_DEV_LISTEN_ADDRESS
              value: 0.0.0.0:8200
          ports:
            - name: http
              containerPort: 8200
